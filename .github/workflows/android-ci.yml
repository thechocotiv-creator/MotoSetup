name: Android CI

on:
  push:
    branches: [main]
    paths: ['android/**', '.github/workflows/android-ci.yml']
  pull_request:
    branches: [main]
    paths: ['android/**', '.github/workflows/android-ci.yml']
  workflow_dispatch:

concurrency:
  group: android-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: android
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Prepare CI google-services.json
        run: cp app/google-services.ci-template.json app/google-services.json

      - name: Unit tests + debug build
        run: ./gradlew testDebugUnitTest assembleDebug
