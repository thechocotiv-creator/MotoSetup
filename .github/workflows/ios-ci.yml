name: iOS CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ios-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: macos-15
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Resolve Swift Package dependencies
        run: |
          if [ -f MotoSetup.xcodeproj/project.pbxproj ] && grep -q "XCRemoteSwiftPackageReference" MotoSetup.xcodeproj/project.pbxproj; then
            xcodebuild -resolvePackageDependencies -project MotoSetup.xcodeproj -scheme MotoSetup
          else
            echo "No SPM dependencies yet — skipping resolution."
          fi

      - name: Show available simulators
        run: xcrun simctl list devices available

      - name: Build
        run: |
          xcodebuild build \
            -project MotoSetup.xcodeproj \
            -scheme MotoSetup \
            -destination 'platform=iOS Simulator,name=iPhone 16' \
            -skipMacroValidation

      - name: Test
        run: |
          xcodebuild test \
            -project MotoSetup.xcodeproj \
            -scheme MotoSetup \
            -destination 'platform=iOS Simulator,name=iPhone 16' \
            -skipMacroValidation
